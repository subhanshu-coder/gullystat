<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>GullyStat</title>
    <script>
      // Redirect all 404s back to index with the path stored
      var path = window.location.pathname.replace('/gullystat', '') || '/';
      sessionStorage.setItem('redirect', path);
      window.location.replace('/gullystat/');
    </script>
  </head>
  <body></body>
</html>
